<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Container Loading Plan - 3D Simulator</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: "Arial", "Malgun Gothic", sans-serif;
    background: #f4f5f7;
    color: #1a1a1a;
  }
  .brand-bar {
    height: 46px;
    flex-shrink: 0;
    background: #10233f;
    display: flex;
    align-items: center;
    padding: 0 18px;
    gap: 10px;
    border-bottom: 3px solid #c8a24a;
  }
  .brand-mark {
    width: 32px; height: 32px;
    border-radius: 6px;
    background: #ffffff;
    object-fit: contain;
    padding: 3px;
    flex-shrink: 0;
  }
  .brand-text { line-height: 1.15; }
  .brand-text .brand-ko {
    color: #fff;
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 1px;
  }
  .brand-text .brand-en {
    color: #c8a24a;
    font-size: 10px;
    letter-spacing: 2px;
  }
  .brand-tool-name {
    margin-left: auto;
    color: #b7c2d6;
    font-size: 12px;
  }
  .app-wrap {
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .app {
    display: flex;
    flex: 1;
    min-height: 0;
  }
  .panel {
    width: 380px;
    min-width: 380px;
    background: #ffffff;
    border-right: 2px solid #1a1a1a;
    overflow-y: auto;
    padding: 16px 18px 40px;
  }
  .panel h1 {
    font-size: 17px;
    margin: 0 0 4px;
    letter-spacing: 0.5px;
  }
  .panel .sub {
    font-size: 11px;
    color: #777;
    margin-bottom: 16px;
  }
  section { margin-bottom: 18px; }
  section h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #2b3a55;
    border-bottom: 2px solid #2b3a55;
    padding-bottom: 4px;
    margin: 0 0 10px;
  }
  label {
    display: block;
    font-size: 11.5px;
    color: #444;
    margin: 8px 0 3px;
  }
  select, input[type=text], input[type=number] {
    width: 100%;
    padding: 6px 8px;
    font-size: 13px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-family: inherit;
  }
  .dims-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }
  .dims-row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .container-info {
    font-size: 11.5px;
    background: #eef1f6;
    border-radius: 4px;
    padding: 8px 10px;
    margin-top: 8px;
    line-height: 1.6;
  }
  button {
    font-family: inherit;
    cursor: pointer;
    border-radius: 4px;
    border: 1px solid #2b3a55;
  }
  .btn-primary {
    width: 100%;
    background: #2b3a55;
    color: #fff;
    padding: 9px;
    font-size: 13.5px;
    margin-top: 6px;
  }
  .btn-secondary {
    width: 100%;
    background: #fff;
    color: #2b3a55;
    padding: 8px;
    font-size: 12.5px;
    margin-top: 6px;
  }
  .btn-add {
    width: 100%;
    background: #3d6b3d;
    border-color: #3d6b3d;
    color: #fff;
    padding: 8px;
    font-size: 12.5px;
    margin-top: 10px;
  }
  .btn-danger {
    background: transparent;
    border: none;
    color: #a33;
    font-size: 12px;
    padding: 2px 6px;
  }
  .cargo-card {
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 7px 9px;
    margin-bottom: 6px;
    font-size: 11.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cargo-color-dot {
    width: 12px; height: 12px; border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.3);
  }
  .cargo-card .meta { flex: 1; line-height: 1.5; }
  .cargo-card .meta b { font-size: 12.5px; }
  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    color: #444;
    margin: 10px 0 0;
  }
  .checkbox-label input { width: auto; }
  .rotation-badge {
    display: inline-block;
    font-size: 10px;
    color: #3d6b3d;
    background: #e6f0e6;
    border-radius: 3px;
    padding: 1px 5px;
    margin-left: 4px;
  }
  .empty-hint {
    font-size: 11.5px;
    color: #999;
    text-align: center;
    padding: 10px 0;
  }
  .result-box {
    font-size: 12px;
    line-height: 1.8;
  }
  .result-row {
    display: flex;
    justify-content: space-between;
  }
  .bar-track {
    background: #e8eaed;
    border-radius: 6px;
    height: 8px;
    margin: 4px 0 8px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: #2b3a55;
  }
  .bar-fill.over { background: #b33; }
  .overflow-warning {
    background: #fdeceb;
    border: 1px solid #e2a5a0;
    color: #8a2e24;
    border-radius: 4px;
    padding: 8px 10px;
    font-size: 11.5px;
    margin-top: 8px;
  }
  .viewer {
    flex: 1;
    position: relative;
  }
  #three-canvas { width: 100%; height: 100%; display: block; }
  .viewer-toolbar {
    position: absolute;
    top: 12px; right: 12px;
    display: flex; gap: 6px;
  }
  .viewer-toolbar button {
    background: #ffffffdd;
    border: 1px solid #999;
    padding: 6px 10px;
    font-size: 12px;
  }
  .legend {
    position: absolute;
    bottom: 12px; left: 12px;
    background: #ffffffdd;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 11.5px;
    max-width: 260px;
    max-height: 200px;
    overflow-y: auto;
  }
  .legend-row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>

    <div class="brand-tool-name">Container Loading Plan Simulator</div>
  </div>
  <div class="app">
  <div class="panel">
    <h1>Container Loading Plan</h1>
    <div class="sub">화물 제원을 입력하면 컨테이너 내부 적재 상태를 3D로 계산합니다.</div>

    <section>
      <h2>1. 컨테이너 선택</h2>
      <label>컨테이너 타입</label>
      <select id="containerType" onchange="onContainerTypeChange()">
        <option value="20DRY">20FT Dry (589.8 x 235.2 x 239.3 cm)</option>
        <option value="40DRY">40FT Dry (1203.2 x 235.2 x 239.3 cm)</option>
        <option value="40HC" selected>40FT High Cube (1203.2 x 235.2 x 269.5 cm)</option>
        <option value="45HC">45FT High Cube (1354.8 x 235.2 x 269.5 cm)</option>
        <option value="custom">사용자 지정</option>
      </select>

      <div id="customDimsBlock" style="display:none;">
        <label>내부 치수 (cm) - Length / Width / Height</label>
        <div class="dims-row">
          <input type="number" id="customL" value="1200" min="1">
          <input type="number" id="customW" value="235" min="1">
          <input type="number" id="customH" value="239" min="1">
        </div>
        <label>최대 적재중량 (kg)</label>
        <input type="number" id="customMaxPayload" value="28000" min="1">
      </div>

      <div class="container-info" id="containerInfo"></div>
    </section>

    <section>
      <h2>2. 화물 제원 입력</h2>
      <label>품명</label>
      <input type="text" id="cargoName" placeholder="예: PALLET A">
      <label>치수 (cm) - Length / Width / Height</label>
      <div class="dims-row">
        <input type="number" id="cargoL" placeholder="L" min="1">
        <input type="number" id="cargoW" placeholder="W" min="1">
        <input type="number" id="cargoH" placeholder="H" min="1">
      </div>
      <label>단위중량 (kg) / 수량</label>
      <div class="dims-row-2">
        <input type="number" id="cargoWeight" placeholder="kg" min="0">
        <input type="number" id="cargoQty" placeholder="수량" min="1" value="1">
      </div>
      <label class="checkbox-label">
        <input type="checkbox" id="cargoRotation">
        회전 적재 허용 (눕혀서/옆으로 적재 가능)
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="cargoStacking">
        이단 적재 허용 (여러 단으로 쌓기 가능)
      </label>
      <button class="btn-add" onclick="addCargoItem()">+ 화물 추가</button>
    </section>

    <section>
      <h2>3. 화물 목록</h2>
      <div id="cargoList"></div>
    </section>

    <button class="btn-primary" onclick="calculatePacking()">적재 계산 실행</button>
    <button class="btn-secondary" onclick="resetAll()">전체 초기화</button>

    <section id="resultSection" style="display:none;">
      <h2>계산 결과</h2>
      <div class="result-box" id="resultBox"></div>
    </section>
  </div>

  <div class="viewer">
    <canvas id="three-canvas"></canvas>
    <div class="viewer-toolbar">
      <button onclick="resetCamera()">뷰 초기화</button>
      <button onclick="toggleContainerShell()">컨테이너 외피 표시/숨김</button>
    </div>
    <div class="legend" id="legend" style="display:none;"></div>
  </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ---------- Container presets (internal dims, cm) ----------
const CONTAINER_PRESETS = {
  '20DRY': { label: '20FT Dry',    L: 589.8,  W: 235.2, H: 239.3, maxPayload: 28180 },
  '40DRY': { label: '40FT Dry',    L: 1203.2, W: 235.2, H: 239.3, maxPayload: 28580 },
  '40HC':  { label: '40FT HC',     L: 1203.2, W: 235.2, H: 269.5, maxPayload: 28560 },
  '45HC':  { label: '45FT HC',     L: 1354.8, W: 235.2, H: 269.5, maxPayload: 27600 },
};

let cargoItems = [];
let cargoIdSeq = 1;
const CARGO_COLORS = [0xe4572e,0x2e86ab,0x2fa84f,0xf3a712,0x8e44ad,0x1abc9c,0xd35400,0x34495e,0xc0392b,0x16a085];

function getContainerDims() {
  const type = document.getElementById('containerType').value;
  if (type === 'custom') {
    return {
      label: '사용자 지정',
      L: parseFloat(document.getElementById('customL').value) || 0,
      W: parseFloat(document.getElementById('customW').value) || 0,
      H: parseFloat(document.getElementById('customH').value) || 0,
      maxPayload: parseFloat(document.getElementById('customMaxPayload').value) || 0
    };
  }
  return CONTAINER_PRESETS[type];
}

function onContainerTypeChange() {
  const type = document.getElementById('containerType').value;
  document.getElementById('customDimsBlock').style.display = (type === 'custom') ? 'block' : 'none';
  updateContainerInfo();
}

function updateContainerInfo() {
  const c = getContainerDims();
  const vol = (c.L * c.W * c.H / 1e6).toFixed(2);
  document.getElementById('containerInfo').innerHTML =
    `내부치수: ${c.L} x ${c.W} x ${c.H} cm<br>내부용적: ${vol} CBM<br>최대 적재중량: ${c.maxPayload.toLocaleString()} kg`;
}

function addCargoItem() {
  const name = document.getElementById('cargoName').value.trim() || `화물 ${cargoItems.length + 1}`;
  const L = parseFloat(document.getElementById('cargoL').value);
  const W = parseFloat(document.getElementById('cargoW').value);
  const H = parseFloat(document.getElementById('cargoH').value);
  const weight = parseFloat(document.getElementById('cargoWeight').value) || 0;
  const qty = parseInt(document.getElementById('cargoQty').value) || 1;
  const allowRotation = document.getElementById('cargoRotation').checked;
  const allowStacking = document.getElementById('cargoStacking').checked;

  if (!L || !W || !H || L <= 0 || W <= 0 || H <= 0) {
    alert('화물의 L/W/H 치수를 올바르게 입력해주세요.');
    return;
  }

  const color = CARGO_COLORS[(cargoIdSeq - 1) % CARGO_COLORS.length];
  cargoItems.push({ id: cargoIdSeq++, name, L, W, H, weight, qty, color, allowRotation, allowStacking });

  document.getElementById('cargoName').value = '';
  document.getElementById('cargoL').value = '';
  document.getElementById('cargoW').value = '';
  document.getElementById('cargoH').value = '';
  document.getElementById('cargoWeight').value = '';
  document.getElementById('cargoQty').value = '1';
  document.getElementById('cargoRotation').checked = false;
  document.getElementById('cargoStacking').checked = false;

  renderCargoList();
}

function removeCargoItem(id) {
  cargoItems = cargoItems.filter(c => c.id !== id);
  renderCargoList();
}

function renderCargoList() {
  const el = document.getElementById('cargoList');
  if (cargoItems.length === 0) {
    el.innerHTML = '<div class="empty-hint">추가된 화물이 없습니다.</div>';
    return;
  }
  el.innerHTML = cargoItems.map(c => `
    <div class="cargo-card">
      <div class="cargo-color-dot" style="background:#${c.color.toString(16).padStart(6,'0')}"></div>
      <div class="meta">
        <b>${c.name}</b> x ${c.qty}${c.allowRotation ? '<span class="rotation-badge">회전 허용</span>' : ''}${c.allowStacking ? '<span class="rotation-badge">이단 적재</span>' : ''}<br>
        ${c.L}x${c.W}x${c.H}cm / ${c.weight}kg
      </div>
      <button class="btn-danger" onclick="removeCargoItem(${c.id})">삭제</button>
    </div>
  `).join('');
}

function resetAll() {
  cargoItems = [];
  cargoIdSeq = 1;
  renderCargoList();
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('legend').style.display = 'none';
  clearScene();
  buildContainerShell();
}

// ---------- Packing algorithm ----------
// Slices the container length into sequential zones per cargo type.
// Within each zone the type is packed as a dense width x height grid,
// choosing whichever orientation packs the most boxes per unit of length used.
// When allowRotation is set, all 6 axis-aligned orientations are tried
// (including standing the box on its side); otherwise only the two
// orientations that keep the item's H dimension vertical are tried.
// When allowStacking is not set, only a single layer (tier) is used.
function orientationsFor(item) {
  const { L, W, H } = item;
  if (!item.allowRotation) {
    return [[L, W, H], [W, L, H]];
  }
  return [
    [L, W, H], [W, L, H],
    [L, H, W], [H, L, W],
    [W, H, L], [H, W, L]
  ];
}

function computePacking(container, items) {
  const CL = container.L, CW = container.W, CH = container.H;
  const sorted = [...items].sort((a, b) => (b.L * b.W * b.H) - (a.L * a.W * a.H));

  let xCursor = 0;
  let totalWeight = 0;
  let totalVolumePlaced = 0;
  let totalBoxesPlaced = 0;
  const placedBoxes = []; // {x,y,z,dx,dy,dz,color,name}
  const perItemResult = [];

  for (const item of sorted) {
    const remainingL = CL - xCursor;
    let best = null;

    for (const [Xdim, Ydim, Zdim] of orientationsFor(item)) {
      if (Xdim > CL || Ydim > CW || Zdim > CH) continue;
      const perRowY = Math.floor(CW / Ydim);
      const perLayerZ = item.allowStacking ? Math.floor(CH / Zdim) : 1;
      const boxesPerSlice = perRowY * perLayerZ;
      if (boxesPerSlice <= 0) continue;
      // boxes packed per unit of container length consumed - the right
      // metric now that Xdim itself varies across orientations
      const density = boxesPerSlice / Xdim;
      if (!best || density > best.density) {
        best = { Xdim, Ydim, Zdim, perRowY, perLayerZ, boxesPerSlice, density };
      }
    }

    if (!best) {
      perItemResult.push({ name: item.name, requested: item.qty, placed: 0, unplaced: item.qty, reason: '치수가 컨테이너 내부에 맞지 않음' });
      continue;
    }

    const fullXslices = Math.floor(remainingL / best.Xdim);
    const maxByLength = fullXslices * best.boxesPerSlice;
    const placedQty = Math.min(item.qty, maxByLength);

    if (placedQty > 0) {
      let placedInThis = 0;
      outer:
      for (let s = 0; s < fullXslices; s++) {
        for (let z = 0; z < best.perLayerZ; z++) {
          for (let y = 0; y < best.perRowY; y++) {
            if (placedInThis >= placedQty) break outer;
            placedBoxes.push({
              x: xCursor + s * best.Xdim,
              y: y * best.Ydim,
              z: z * best.Zdim,
              dx: best.Xdim, dy: best.Ydim, dz: best.Zdim,
              color: item.color, name: item.name
            });
            placedInThis++;
          }
        }
      }
      const slicesUsed = Math.ceil(placedQty / best.boxesPerSlice);
      xCursor += slicesUsed * best.Xdim;
      totalVolumePlaced += (item.L * item.W * item.H / 1e6) * placedQty;
      totalWeight += item.weight * placedQty;
      totalBoxesPlaced += placedQty;
    }

    perItemResult.push({
      name: item.name,
      requested: item.qty,
      placed: placedQty,
      unplaced: item.qty - placedQty,
      reason: placedQty < item.qty ? '컨테이너 길이 초과로 일부 미적재' : null
    });
  }

  return {
    placedBoxes,
    perItemResult,
    totalWeight,
    totalVolumePlaced,
    totalBoxesPlaced,
    lengthUsed: xCursor
  };
}

function calculatePacking() {
  if (cargoItems.length === 0) {
    alert('화물을 1개 이상 추가해주세요.');
    return;
  }
  const container = getContainerDims();
  if (!container.L || !container.W || !container.H) {
    alert('컨테이너 치수를 확인해주세요.');
    return;
  }

  const result = computePacking(container, cargoItems);
  renderScene(container, result.placedBoxes);
  renderResult(container, result);
}

function renderResult(container, result) {
  const containerVol = container.L * container.W * container.H / 1e6;
  const volPct = Math.min(100, (result.totalVolumePlaced / containerVol) * 100);
  const weightPct = Math.min(100, (result.totalWeight / container.maxPayload) * 100);
  const overWeight = result.totalWeight > container.maxPayload;

  const unplacedRows = result.perItemResult.filter(r => r.unplaced > 0);

  let html = `
    <div class="result-row"><span>적재 화물 수</span><b>${result.totalBoxesPlaced} 개</b></div>
    <div class="result-row"><span>용적 사용</span><b>${result.totalVolumePlaced.toFixed(2)} / ${containerVol.toFixed(2)} CBM</b></div>
    <div class="bar-track"><div class="bar-fill" style="width:${volPct}%"></div></div>
    <div class="result-row"><span>중량 사용</span><b>${result.totalWeight.toLocaleString()} / ${container.maxPayload.toLocaleString()} kg</b></div>
    <div class="bar-track"><div class="bar-fill ${overWeight ? 'over' : ''}" style="width:${weightPct}%"></div></div>
    <div class="result-row"><span>사용된 길이</span><b>${result.lengthUsed.toFixed(1)} / ${container.L} cm</b></div>
  `;

  if (overWeight) {
    html += `<div class="overflow-warning">⚠ 총 중량(${result.totalWeight.toLocaleString()}kg)이 컨테이너 최대 적재중량(${container.maxPayload.toLocaleString()}kg)을 초과했습니다.</div>`;
  }
  if (unplacedRows.length > 0) {
    html += `<div class="overflow-warning">⚠ 미적재 화물:<br>` +
      unplacedRows.map(r => `- ${r.name}: 요청 ${r.requested} / 미적재 ${r.unplaced} (${r.reason})`).join('<br>') +
      `</div>`;
  }

  document.getElementById('resultBox').innerHTML = html;
  document.getElementById('resultSection').style.display = 'block';

  const legendItems = [...new Map(cargoItems.map(c => [c.name, c.color])).entries()];
  document.getElementById('legend').innerHTML = legendItems.map(([name, color]) =>
    `<div class="legend-row"><div class="legend-dot" style="background:#${color.toString(16).padStart(6,'0')}"></div>${name}</div>`
  ).join('');
  document.getElementById('legend').style.display = 'block';
}

// ---------- Three.js scene ----------
let scene, camera, renderer, controls;
let containerGroup, cargoGroup, shellMesh;
let shellVisible = true;

function initThree() {
  const canvas = document.getElementById('three-canvas');
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xdfe3e8);

  camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(canvas.clientWidth, canvas.clientHeight);

  const ambient = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambient);
  const dir = new THREE.DirectionalLight(0xffffff, 0.6);
  dir.position.set(8, 12, 10);
  scene.add(dir);
  const dir2 = new THREE.DirectionalLight(0xffffff, 0.3);
  dir2.position.set(-8, 6, -10);
  scene.add(dir2);

  const grid = new THREE.GridHelper(30, 30, 0x999999, 0xcccccc);
  scene.add(grid);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  containerGroup = new THREE.Group();
  cargoGroup = new THREE.Group();
  scene.add(containerGroup);
  scene.add(cargoGroup);

  window.addEventListener('resize', onWindowResize);
  animate();
}

function onWindowResize() {
  const canvas = document.getElementById('three-canvas');
  camera.aspect = canvas.clientWidth / canvas.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(canvas.clientWidth, canvas.clientHeight);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

function clearScene() {
  cargoGroup.clear();
  containerGroup.clear();
}

function buildContainerShell() {
  const container = getContainerDims();
  containerGroup.clear();
  if (!container.L || !container.W || !container.H) return;

  const L = container.L / 100, W = container.W / 100, H = container.H / 100;
  const geo = new THREE.BoxGeometry(L, H, W);
  const edges = new THREE.EdgesGeometry(geo);
  shellMesh = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x1a1a1a, linewidth: 2 }));
  shellMesh.position.set(L / 2, H / 2, W / 2);
  containerGroup.add(shellMesh);

  const floorGeo = new THREE.PlaneGeometry(L, W);
  const floorMat = new THREE.MeshBasicMaterial({ color: 0xb8bfc9, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = Math.PI / 2;
  floor.position.set(L / 2, 0, W / 2);
  containerGroup.add(floor);

  positionCameraForContainer(L, H, W);
}

function positionCameraForContainer(L, H, W) {
  const maxDim = Math.max(L, H, W);
  camera.position.set(L * 1.3, H * 1.6 + maxDim * 0.3, W * 2.4 + maxDim);
  controls.target.set(L / 2, H / 3, W / 2);
  controls.update();
}

function resetCamera() {
  const container = getContainerDims();
  positionCameraForContainer(container.L / 100, container.H / 100, container.W / 100);
}

function toggleContainerShell() {
  shellVisible = !shellVisible;
  containerGroup.visible = shellVisible;
}

function renderScene(container, boxes) {
  cargoGroup.clear();
  buildContainerShell();

  const CWm = container.W / 100;

  boxes.forEach(b => {
    const dx = b.dx / 100, dy = b.dy / 100, dz = b.dz / 100;
    const geo = new THREE.BoxGeometry(dx * 0.96, dz * 0.96, dy * 0.96);
    const mat = new THREE.MeshStandardMaterial({ color: b.color, roughness: 0.7, metalness: 0.05 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
      (b.x + b.dx / 2) / 100,
      (b.z + b.dz / 2) / 100,
      (b.y + b.dy / 2) / 100
    );
    cargoGroup.add(mesh);

    const edges = new THREE.EdgesGeometry(geo);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.25 }));
    line.position.copy(mesh.position);
    cargoGroup.add(line);
  });
}

// ---------- init ----------
window.addEventListener('DOMContentLoaded', () => {
  updateContainerInfo();
  renderCargoList();
  initThree();
  buildContainerShell();
});
</script>

</body>
</html>
